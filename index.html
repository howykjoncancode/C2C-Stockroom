<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stockroom — C2C Robotics Inventory</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap">
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  :root {
    --bg: #F5F4F1;
    --panel: #FFFFFF;
    --ink: #1E2320;
    --border: #DCDAD3;
    --border-soft: #EEEDE7;
    --muted: #6B6F68;
    --accent: #2F5D74;
    --accent-bg: #EAF1F0;
    --warn: #C97A2B;
    --warn-bg: #FBEEDF;
    --danger: #A93226;
    --danger-bg: #F6E4E2;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--ink);
  }
  .app { display: flex; height: 100vh; }

  /* Sidebar */
  .sidebar {
    width: 240px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .brand { padding: 20px 18px 14px; }
  .brand-row { display: flex; align-items: center; gap: 8px; }
  .brand-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 0.01em;
  }
  .brand-sub { font-size: 11px; color: var(--muted); margin-top: 2px; letter-spacing: 0.03em; }

  .folder-list { padding: 4px 10px; flex: 1; overflow-y: auto; }
  .folder-item, .folder-all {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 10px; border-radius: 5px; cursor: pointer;
    font-size: 13.5px; margin-bottom: 2px;
  }
  .folder-item:hover, .folder-all:hover { background: #F7F6F3; }
  .folder-item.active, .folder-all.active { background: var(--accent-bg); color: var(--accent); font-weight: 600; }
  .folder-name { display: flex; align-items: center; gap: 7px; }
  .folder-count { font-family: 'IBM Plex Mono', monospace; font-size: 12px; opacity: 0.65; }
  .folder-edit-btn {
    opacity: 0; background: none; border: none; cursor: pointer; color: var(--muted); padding: 2px;
  }
  .folder-item:hover .folder-edit-btn { opacity: 1; }
  .divider { height: 1px; background: var(--border-soft); margin: 8px 4px; }
  .add-folder {
    display: flex; align-items: center; gap: 6px; padding: 8px 10px;
    font-size: 13px; color: var(--muted); cursor: pointer; border-radius: 5px;
  }
  .add-folder:hover { background: #F7F6F3; }

  .low-stock-banner {
    margin: 12px; padding: 10px 12px; background: var(--warn-bg); border-radius: 6px;
    display: flex; align-items: flex-start; gap: 8px; font-size: 12.5px; line-height: 1.4; color: #5A4322;
  }
  .footer-note { padding: 10px 16px 16px; font-size: 11px; color: #9A988E; border-top: 1px solid var(--border-soft); }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .topbar {
    padding: 16px 22px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
  }
  .topbar-left { display: flex; align-items: center; gap: 14px; }
  .search-wrap { position: relative; display: flex; align-items: center; }
  .search-wrap svg { position: absolute; left: 10px; }
  .search-input {
    width: 260px; padding: 7px 10px 7px 32px; border: 1px solid var(--border); border-radius: 5px;
    font-size: 13.5px; font-family: 'Inter', sans-serif; outline: none; background: #FBFAF8;
  }
  .unit-total { font-size: 12.5px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }

  .btn-primary {
    display: flex; align-items: center; gap: 6px; background: var(--accent); color: #fff;
    border: none; border-radius: 5px; padding: 8px 14px; font-size: 13.5px; font-weight: 600;
    cursor: pointer; font-family: 'Inter', sans-serif;
  }
  .btn-primary:hover { background: #26495B; }

  .table-wrap { flex: 1; overflow-y: auto; padding: 0 22px; }
  table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  th {
    text-align: left; padding: 12px 10px; font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--muted); font-weight: 600; border-bottom: 1px solid var(--border);
  }
  td { padding: 12px 10px; border-bottom: 1px solid var(--border-soft); }
  .sku-cell { font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; color: var(--muted); }
  .folder-cell { color: var(--muted); }
  .row-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .icon-btn { background: none; border: none; cursor: pointer; padding: 2px; color: var(--muted); }
  .icon-btn.danger { color: var(--danger); }

  .badge {
    font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
    text-transform: uppercase; padding: 3px 8px; border-radius: 3px;
  }
  .badge.ok { background: var(--accent-bg); color: var(--accent); }
  .badge.warn { background: var(--warn-bg); color: var(--warn); }
  .badge.danger { background: var(--danger-bg); color: var(--danger); }

  .gauge-wrap { display: flex; align-items: center; gap: 8px; }
  .gauge-bars { display: flex; gap: 2px; }
  .gauge-seg { width: 6px; height: 16px; border-radius: 1px; background: #E4E2DB; }
  .gauge-qty { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 500; min-width: 70px; }

  .empty-state {
    text-align: center; padding: 60px 10px; color: #9A988E;
  }
  .empty-state button {
    margin-top: 12px; background: var(--accent); color: #fff; border: none; border-radius: 5px;
    padding: 9px 16px; font-size: 13.5px; font-weight: 600; cursor: pointer;
  }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(30,35,32,0.35);
    display: flex; align-items: center; justify-content: center; z-index: 50;
  }
  .modal {
    background: #fff; border-radius: 8px; width: 380px; padding: 22px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.18);
  }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .modal-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 20px; }
  .modal-close { background: none; border: none; cursor: pointer; color: var(--muted); }
  .field { margin-bottom: 12px; }
  .field label { font-size: 12px; color: var(--muted); font-weight: 600; display: block; margin-bottom: 4px; }
  .field input, .field select {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 5px;
    font-size: 13.5px; font-family: 'Inter', sans-serif; box-sizing: border-box; background: #fff;
  }
  .field input.mono { font-family: 'IBM Plex Mono', monospace; }
  .field-row { display: flex; gap: 10px; margin-bottom: 12px; }
  .field-row .field { flex: 1; margin-bottom: 0; }
  .modal-save {
    width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 5px;
    padding: 10px; font-size: 13.5px; font-weight: 600; cursor: pointer; margin-top: 6px;
  }
  .modal-save.danger-save { background: var(--danger); }

  .custom-fields-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
  .custom-field-row { display: flex; gap: 6px; align-items: center; }
  .custom-field-row input { flex: 1; padding: 6px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 12.5px; }
  .custom-field-remove { background: none; border: none; color: var(--danger); cursor: pointer; padding: 4px; }
  .add-custom-field { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--accent); cursor: pointer; margin-bottom: 12px; }

  .barcode-modal-inner { text-align: center; }
  .barcode-canvas-wrap { background: #fff; padding: 12px; border: 1px solid var(--border); border-radius: 6px; margin: 12px 0; }
  .barcode-actions { display: flex; gap: 8px; }
  .barcode-actions button { flex: 1; }
  .btn-secondary {
    background: #F2F1EC; color: var(--ink); border: 1px solid var(--border); border-radius: 5px;
    padding: 10px; font-size: 13.5px; font-weight: 600; cursor: pointer;
  }

  #qr-reader-wrap { width: 100%; }
  #qr-reader { width: 100%; border-radius: 6px; overflow: hidden; }
  .scan-status { font-size: 12.5px; color: var(--muted); margin-top: 10px; text-align: center; }

  .row-actions svg { display: block; }

  .adjust-item-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 20px; }
  .adjust-item-sub { font-size: 12px; color: var(--muted); margin-top: 2px; margin-bottom: 16px; font-family: 'IBM Plex Mono', monospace; }
  .adjust-current { font-size: 13px; color: var(--muted); margin-bottom: 14px; }
  .adjust-current strong { color: var(--ink); font-family: 'IBM Plex Mono', monospace; }
  .adjust-amount-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .adjust-amount-row input {
    width: 90px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 5px;
    font-size: 15px; font-family: 'IBM Plex Mono', monospace; text-align: center;
  }
  .adjust-btn-row { display: flex; gap: 10px; margin-bottom: 10px; }
  .adjust-btn-row button {
    flex: 1; border: none; border-radius: 5px; padding: 12px; font-size: 13.5px; font-weight: 600; cursor: pointer;
    font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn-checkin { background: var(--accent-bg); color: var(--accent); }
  .btn-checkout { background: var(--danger-bg); color: var(--danger); }
  .adjust-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
  .adjust-link { font-size: 12.5px; color: var(--muted); cursor: pointer; text-decoration: underline; }

  .lock-screen {
    position: fixed; inset: 0; background: var(--bg); z-index: 100;
    display: flex; align-items: center; justify-content: center;
  }
  .lock-box { text-align: center; width: 280px; }
  .lock-brand { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 6px; }
  .lock-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 24px; }
  .lock-sub { font-size: 12px; color: var(--muted); margin-bottom: 22px; letter-spacing: 0.03em; }
  .lock-box input {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 5px;
    font-size: 14px; font-family: 'IBM Plex Mono', monospace; text-align: center; box-sizing: border-box;
    margin-bottom: 10px;
  }
  .lock-box button {
    width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 5px;
    padding: 10px; font-size: 13.5px; font-weight: 600; cursor: pointer;
  }
  .lock-error { color: var(--danger); font-size: 12px; margin-top: 8px; min-height: 16px; }

  .thumb {
    width: 38px; height: 38px; border-radius: 5px; overflow: hidden; background: #ECEAE3;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb svg { opacity: 0.35; }

  .photo-upload-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .photo-preview-box {
    width: 64px; height: 64px; border-radius: 6px; overflow: hidden; background: #ECEAE3;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: 1px solid var(--border);
  }
  .photo-preview-box img { width: 100%; height: 100%; object-fit: cover; }
  .photo-upload-controls { display: flex; flex-direction: column; gap: 6px; }
  .photo-upload-controls label {
    font-size: 12.5px; color: var(--accent); cursor: pointer; text-decoration: underline;
  }
  .photo-remove-link { font-size: 12px; color: var(--danger); cursor: pointer; text-decoration: underline; }

  .activity-link {
    display: flex; align-items: center; gap: 7px; padding: 8px 16px; font-size: 12.5px;
    color: var(--muted); cursor: pointer; border-top: 1px solid var(--border-soft);
  }
  .activity-link:hover { color: var(--accent); }

  .activity-summary-row { display: flex; gap: 12px; margin-bottom: 18px; }
  .activity-summary-card { flex: 1; padding: 12px 14px; border-radius: 6px; }
  .activity-summary-card.in-card { background: var(--accent-bg); }
  .activity-summary-card.out-card { background: var(--danger-bg); }
  .activity-summary-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; margin-bottom: 4px;
  }
  .in-card .activity-summary-label { color: var(--accent); }
  .out-card .activity-summary-label { color: var(--danger); }
  .activity-summary-value { font-family: 'IBM Plex Mono', monospace; font-size: 20px; font-weight: 500; }

  .activity-range-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
  .activity-range-tab {
    padding: 5px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; color: var(--muted);
    background: #F2F1EC;
  }
  .activity-range-tab.active { background: var(--accent); color: #fff; }

  .activity-log-list { max-height: 260px; overflow-y: auto; }
  .activity-log-row {
    display: flex; justify-content: space-between; align-items: center; padding: 8px 0;
    border-bottom: 1px solid var(--border-soft); font-size: 12.5px;
  }
  .activity-log-item { font-weight: 500; }
  .activity-log-meta { color: var(--muted); font-size: 11.5px; }
  .activity-log-amount { font-family: 'IBM Plex Mono', monospace; font-weight: 500; }
  .activity-log-amount.in { color: var(--accent); }
  .activity-log-amount.out { color: var(--danger); }
  .activity-empty { text-align: center; color: #9A988E; padding: 30px 10px; font-size: 13px; }
</style>
</head>
<body>

<div class="lock-screen" id="lock-screen">
  <div class="lock-box">
    <div class="lock-brand">
      <div class="lock-title">STOCKROOM</div>
    </div>
    <div class="lock-sub">C2C ROBOTICS · PROCUREMENT</div>
    <input type="password" id="lock-password" placeholder="Enter password" autofocus />
    <button id="lock-submit">Unlock</button>
    <div class="lock-error" id="lock-error"></div>
  </div>
</div>

<div class="app" id="app" style="display:none;"></div>

<script>
(function () {
  const SITE_PASSWORD = "C2CONLY";
  const UNLOCK_KEY = "stockroom-unlocked";

  function tryUnlock() {
    const input = document.getElementById("lock-password").value;
    if (input === SITE_PASSWORD) {
      sessionStorage.setItem(UNLOCK_KEY, "1");
      document.getElementById("lock-screen").style.display = "none";
      document.getElementById("app").style.display = "flex";
      startApp();
    } else {
      document.getElementById("lock-error").textContent = "Incorrect password.";
    }
  }

  document.getElementById("lock-submit").addEventListener("click", tryUnlock);
  document.getElementById("lock-password").addEventListener("keydown", (e) => {
    if (e.key === "Enter") tryUnlock();
  });

  if (sessionStorage.getItem(UNLOCK_KEY) === "1") {
    document.getElementById("lock-screen").style.display = "none";
    document.getElementById("app").style.display = "flex";
    startApp();
  }

  function startApp() {

  const STORAGE_KEY = "stockroom-data-v1";
  const svg = {
    box: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4a2 2 0 0 0 1-1.73Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>`,
    search: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#9A988E" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>`,
    plus: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5v14"/></svg>`,
    alert: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#C97A2B" stroke-width="2"><path d="m21.73 18-8-14a2 2 0 0 0-3.46 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4M12 17h.01"/></svg>`,
    chevron: `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#B4B2A9" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>`,
    x: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>`,
    pencil: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>`,
    trash: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6"/></svg>`,
    barcode: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 5v14M8 5v14M12 5v14M17 5v14M21 5v14"/></svg>`,
    camera: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>`,
  };

  let state = {
    folders: [],
    items: [],
    activityLog: [],
    selectedFolder: "all",
    search: "",
    activityRange: "7d",
  };

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        state.folders = parsed.folders || [];
        state.items = parsed.items || [];
        state.activityLog = parsed.activityLog || [];
      }
    } catch (e) {
      console.error("Could not load saved inventory:", e);
    }
  }

  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        folders: state.folders,
        items: state.items,
        activityLog: state.activityLog,
      }));
      document.getElementById("save-status").textContent = "Saved automatically.";
      document.getElementById("save-status").style.color = "#9A988E";
    } catch (e) {
      document.getElementById("save-status").textContent = "Couldn't save last change (storage may be full).";
      document.getElementById("save-status").style.color = "#A93226";
    }
  }

  function uid(prefix) {
    return prefix + Date.now() + Math.floor(Math.random() * 1000);
  }

  function stockTone(item) {
    if (item.qty <= item.min * 0.5) return "danger";
    if (item.qty <= item.min) return "warn";
    return "ok";
  }

  function escapeHtml(str) {
    const d = document.createElement("div");
    d.textContent = str;
    return d.innerHTML;
  }

  function render() {
    const filtered = state.items.filter((it) => {
      const matchFolder = state.selectedFolder === "all" || it.folderId === state.selectedFolder;
      const q = state.search.trim().toLowerCase();
      const matchSearch = !q || it.name.toLowerCase().includes(q) || it.sku.toLowerCase().includes(q);
      return matchFolder && matchSearch;
    });

    const lowStockCount = state.items.filter((it) => it.qty <= it.min).length;
    const totalUnits = state.items.reduce((s, it) => s + Number(it.qty || 0), 0);

    const folderRows = state.folders.map((f) => {
      const count = state.items.filter((it) => it.folderId === f.id).length;
      const active = state.selectedFolder === f.id;
      return `
        <div class="folder-item ${active ? "active" : ""}" data-folder="${f.id}">
          <span class="folder-name" data-select-folder="${f.id}">${svg.chevron} ${escapeHtml(f.name)}</span>
          <span style="display:flex; align-items:center; gap:6px;">
            <span class="folder-count">${count}</span>
            <button class="folder-edit-btn" data-edit-folder="${f.id}" title="Rename or delete folder">${svg.pencil}</button>
          </span>
        </div>`;
    }).join("");

    const tableRows = filtered.map((item) => {
      const folder = state.folders.find((f) => f.id === item.folderId);
      const tone = stockTone(item);
      const pct = item.max > 0 ? Math.max(0, Math.min(1, item.qty / item.max)) : 0;
      const filledSeg = Math.round(pct * 10);
      const segs = Array.from({ length: 10 }).map((_, i) =>
        `<div class="gauge-seg" style="background:${i < filledSeg ? gaugeColor(tone) : "#E4E2DB"}"></div>`
      ).join("");
      const badgeLabel = tone === "danger" ? "Reorder now" : tone === "warn" ? "Low stock" : "In stock";
      return `
        <tr>
          <td>
            <div class="thumb">
              ${item.photo ? `<img src="${item.photo}" alt="">` : svg.box}
            </div>
          </td>
          <td style="font-weight:500;">${escapeHtml(item.name)}</td>
          <td class="sku-cell">${escapeHtml(item.sku)}</td>
          <td class="folder-cell">${escapeHtml(folder ? folder.name : "—")}</td>
          <td>
            <div class="gauge-wrap">
              <div class="gauge-bars">${segs}</div>
              <span class="gauge-qty" style="color:${tone === "ok" ? "var(--ink)" : gaugeColor(tone)}">${item.qty} ${escapeHtml(item.unit)}</span>
            </div>
          </td>
          <td><span class="badge ${tone}">${badgeLabel}</span></td>
          <td>
            <div class="row-actions">
              <button class="icon-btn" data-barcode-item="${item.id}" title="View / print barcode">${svg.barcode}</button>
              <button class="icon-btn" data-edit-item="${item.id}" title="Edit">${svg.pencil}</button>
              <button class="icon-btn danger" data-delete-item="${item.id}" title="Delete">${svg.trash}</button>
            </div>
          </td>
        </tr>`;
    }).join("");

    const emptyState = `
      <tr><td colspan="7">
        <div class="empty-state">
          ${state.items.length === 0
            ? `<div>No items yet. Add your first real unit to get started.</div><button id="empty-add-btn">${svg.plus} Add Item</button>`
            : `<div>No items match. Try a different folder or search term.</div>`}
        </div>
      </td></tr>`;

    document.getElementById("app").innerHTML = `
      <div class="sidebar">
        <div class="brand">
          <div class="brand-row">${svg.box} <span class="brand-title">STOCKROOM</span></div>
          <div class="brand-sub">C2C ROBOTICS · PROCUREMENT</div>
        </div>
        <div class="folder-list">
          <div class="folder-all ${state.selectedFolder === "all" ? "active" : ""}" data-select-folder="all">
            <span>All Items</span>
            <span class="folder-count">${state.items.length}</span>
          </div>
          <div class="divider"></div>
          ${folderRows}
          <div class="add-folder" id="add-folder-btn">${svg.plus} New folder</div>
        </div>
        ${lowStockCount > 0 ? `
          <div class="low-stock-banner">
            ${svg.alert}
            <div><strong>${lowStockCount}</strong> item${lowStockCount > 1 ? "s" : ""} at or below minimum stock.</div>
          </div>` : ""}
        <div class="activity-link" id="activity-log-btn">${svg.chevron} Activity Log</div>
        <div class="footer-note" id="save-status">Saved automatically.</div>
      </div>
      <div class="main">
        <div class="topbar">
          <div class="topbar-left">
            <div class="search-wrap">
              ${svg.search}
              <input class="search-input" id="search-input" placeholder="Search by name or SKU" value="${escapeHtml(state.search)}" style="padding-left:32px;" />
            </div>
            <div class="unit-total">${totalUnits.toLocaleString()} total units on hand</div>
          </div>
          <div style="display:flex; gap:10px;">
            <button class="btn-secondary" id="scan-btn" style="display:flex; align-items:center; gap:6px;">${svg.camera} Scan Barcode</button>
            <button class="btn-primary" id="add-item-btn">${svg.plus} Add Item</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th></th><th>Item</th><th>SKU</th><th>Folder</th><th>Stock Level</th><th>Status</th><th></th></tr></thead>
            <tbody>${filtered.length ? tableRows : emptyState}</tbody>
          </table>
        </div>
      </div>
    `;

    attachHandlers();
  }

  function gaugeColor(tone) {
    return tone === "danger" ? "#A93226" : tone === "warn" ? "#C97A2B" : "#2F5D74";
  }

  function attachHandlers() {
    document.querySelectorAll("[data-select-folder]").forEach((el) => {
      el.addEventListener("click", () => {
        state.selectedFolder = el.getAttribute("data-select-folder");
        render();
      });
    });

    const searchInput = document.getElementById("search-input");
    if (searchInput) {
      searchInput.addEventListener("input", (e) => {
        state.search = e.target.value;
        render();
        document.getElementById("search-input").focus();
        document.getElementById("search-input").setSelectionRange(state.search.length, state.search.length);
      });
    }

    const addItemBtn = document.getElementById("add-item-btn");
    if (addItemBtn) addItemBtn.addEventListener("click", () => openItemModal(null));

    const emptyAddBtn = document.getElementById("empty-add-btn");
    if (emptyAddBtn) emptyAddBtn.addEventListener("click", () => openItemModal(null));

    document.querySelectorAll("[data-edit-item]").forEach((el) => {
      el.addEventListener("click", () => {
        const id = el.getAttribute("data-edit-item");
        openItemModal(state.items.find((it) => it.id === id));
      });
    });

    document.querySelectorAll("[data-delete-item]").forEach((el) => {
      el.addEventListener("click", () => {
        const id = el.getAttribute("data-delete-item");
        state.items = state.items.filter((it) => it.id !== id);
        saveState();
        render();
      });
    });

    document.querySelectorAll("[data-edit-folder]").forEach((el) => {
      el.addEventListener("click", (e) => {
        e.stopPropagation();
        const id = el.getAttribute("data-edit-folder");
        openFolderModal(state.folders.find((f) => f.id === id));
      });
    });

    const addFolderBtn = document.getElementById("add-folder-btn");
    if (addFolderBtn) addFolderBtn.addEventListener("click", () => openFolderModal(null));

    document.querySelectorAll("[data-barcode-item]").forEach((el) => {
      el.addEventListener("click", () => {
        const id = el.getAttribute("data-barcode-item");
        openBarcodeModal(state.items.find((it) => it.id === id));
      });
    });

    const scanBtn = document.getElementById("scan-btn");
    if (scanBtn) scanBtn.addEventListener("click", openScanModal);

    const activityBtn = document.getElementById("activity-log-btn");
    if (activityBtn) activityBtn.addEventListener("click", openActivityLog);
  }

  function openQuickAdjustModal(item) {
    const folder = state.folders.find((f) => f.id === item.folderId);

    showModal(`
      <div class="modal-header">
        <div class="modal-title">Scanned Item</div>
        <button class="modal-close" id="modal-close">${svg.x}</button>
      </div>
      <div class="adjust-item-name">${escapeHtml(item.name)}</div>
      <div class="adjust-item-sub">${escapeHtml(item.sku)} · ${escapeHtml(folder ? folder.name : "")}</div>
      <div class="adjust-current">Currently on hand: <strong>${item.qty} ${escapeHtml(item.unit)}</strong></div>
      <div class="adjust-amount-row">
        <label style="font-size:12px; color:var(--muted); font-weight:600;">Amount</label>
        <input type="number" id="adjust-amount" value="1" min="1" />
      </div>
      <div class="adjust-btn-row">
        <button class="btn-checkin" id="checkin-btn">${svg.plus} Check In</button>
        <button class="btn-checkout" id="checkout-btn">− Check Out</button>
      </div>
      <div class="adjust-footer">
        <span class="adjust-link" id="scan-another-link">Scan another item</span>
        <span class="adjust-link" id="full-edit-link">Edit full details</span>
      </div>
    `);

    function applyAdjust(direction) {
      const amount = Math.max(0, Number(document.getElementById("adjust-amount").value) || 0);
      if (amount === 0) return;
      const delta = direction === "in" ? amount : -amount;
      const beforeTone = stockTone(item);
      const newQty = Math.max(0, item.qty + delta);
      const updatedItem = { ...item, qty: newQty };
      state.items = state.items.map((it) => (it.id === item.id ? updatedItem : it));
      state.activityLog.unshift({
        id: uid("log"),
        itemId: item.id,
        itemName: item.name,
        direction,
        amount,
        qtyAfter: newQty,
        timestamp: Date.now(),
      });
      // Cap log size so storage doesn't grow unbounded
      if (state.activityLog.length > 500) state.activityLog = state.activityLog.slice(0, 500);
      saveState();
      const afterTone = stockTone(updatedItem);
      if (direction === "out" && beforeTone === "ok" && afterTone !== "ok") {
        notifyLowStock(updatedItem);
      }
      closeModal();
      render();
    }

    document.getElementById("checkin-btn").addEventListener("click", () => applyAdjust("in"));
    document.getElementById("checkout-btn").addEventListener("click", () => applyAdjust("out"));

    document.getElementById("full-edit-link").addEventListener("click", () => {
      closeModal();
      openItemModal(item);
    });

    document.getElementById("scan-another-link").addEventListener("click", () => {
      closeModal();
      openScanModal();
    });
  }

  function notifyLowStock(item) {
    if (!("Notification" in window)) return;
    const body = `${item.qty} ${item.unit} remaining (min ${item.min})`;
    if (Notification.permission === "granted") {
      new Notification("Low stock: " + item.name, { body });
    } else if (Notification.permission !== "denied") {
      Notification.requestPermission().then((perm) => {
        if (perm === "granted") {
          new Notification("Low stock: " + item.name, { body });
        }
      });
    }
  }

  function openActivityLog() {
    renderActivityLog("7d");
  }

  function renderActivityLog(range) {
    state.activityRange = range;
    const now = Date.now();
    const rangeMs = { "today": 24 * 60 * 60 * 1000, "7d": 7 * 24 * 60 * 60 * 1000, "30d": 30 * 24 * 60 * 60 * 1000, "all": Infinity }[range];
    const inRange = state.activityLog.filter((e) => now - e.timestamp <= rangeMs);

    const totalIn = inRange.filter((e) => e.direction === "in").reduce((s, e) => s + e.amount, 0);
    const totalOut = inRange.filter((e) => e.direction === "out").reduce((s, e) => s + e.amount, 0);

    const rangeLabels = { today: "Today", "7d": "Last 7 days", "30d": "Last 30 days", all: "All time" };
    const tabs = ["today", "7d", "30d", "all"].map((r) =>
      `<div class="activity-range-tab ${range === r ? "active" : ""}" data-range="${r}">${rangeLabels[r]}</div>`
    ).join("");

    const logRows = inRange.slice(0, 100).map((e) => {
      const date = new Date(e.timestamp);
      const dateStr = date.toLocaleDateString() + " " + date.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      return `
        <div class="activity-log-row">
          <div>
            <div class="activity-log-item">${escapeHtml(e.itemName)}</div>
            <div class="activity-log-meta">${dateStr}</div>
          </div>
          <div class="activity-log-amount ${e.direction}">${e.direction === "in" ? "+" : "−"}${e.amount}</div>
        </div>`;
    }).join("");

    showModal(`
      <div class="modal-header">
        <div class="modal-title">Activity Log</div>
        <button class="modal-close" id="modal-close">${svg.x}</button>
      </div>
      <div class="activity-range-tabs">${tabs}</div>
      <div class="activity-summary-row">
        <div class="activity-summary-card in-card">
          <div class="activity-summary-label">Checked in</div>
          <div class="activity-summary-value">+${totalIn}</div>
        </div>
        <div class="activity-summary-card out-card">
          <div class="activity-summary-label">Checked out</div>
          <div class="activity-summary-value">−${totalOut}</div>
        </div>
      </div>
      <div class="activity-log-list">
        ${inRange.length ? logRows : `<div class="activity-empty">No check-ins or check-outs in this range yet.</div>`}
      </div>
    `);

    document.querySelectorAll("[data-range]").forEach((el) => {
      el.addEventListener("click", () => renderActivityLog(el.getAttribute("data-range")));
    });
  }

  function openBarcodeModal(item) {
    showModal(`
      <div class="modal-header">
        <div class="modal-title">Barcode</div>
        <button class="modal-close" id="modal-close">${svg.x}</button>
      </div>
      <div class="barcode-modal-inner">
        <div style="font-size:13.5px; font-weight:500; margin-bottom:2px;">${escapeHtml(item.name)}</div>
        <div style="font-size:12px; color:var(--muted); font-family:'IBM Plex Mono', monospace;">${escapeHtml(item.barcode || item.sku)}</div>
        <div class="barcode-canvas-wrap">
          <svg id="barcode-svg"></svg>
        </div>
        <div class="barcode-actions">
          <button class="btn-secondary" id="print-barcode-btn">Print label</button>
        </div>
      </div>
    `);

    try {
      JsBarcode("#barcode-svg", item.barcode || item.sku, {
        format: "CODE128",
        width: 2,
        height: 60,
        fontSize: 13,
        margin: 8,
      });
    } catch (e) {
      document.getElementById("barcode-svg").outerHTML = `<div style="color:var(--danger); font-size:12.5px;">Couldn't generate barcode for this value.</div>`;
    }

    const printBtn = document.getElementById("print-barcode-btn");
    if (printBtn) {
      printBtn.addEventListener("click", () => {
        const svgMarkup = document.getElementById("barcode-svg").outerHTML;
        const win = window.open("", "_blank", "width=400,height=300");
        win.document.write(`
          <html><head><title>Label — ${escapeHtml(item.name)}</title></head>
          <body style="text-align:center; font-family:sans-serif; padding:20px;">
            <div style="font-weight:600; margin-bottom:8px;">${escapeHtml(item.name)}</div>
            ${svgMarkup}
            <script>window.onload = () => { window.print(); }<\/script>
          </body></html>
        `);
        win.document.close();
      });
    }
  }

  function openScanModal() {
    if (typeof Html5Qrcode === "undefined") {
      alert("Camera scanning library didn't load. Check your internet connection and try again.");
      return;
    }
    showModal(`
      <div class="modal-header">
        <div class="modal-title">Scan Barcode</div>
        <button class="modal-close" id="modal-close">${svg.x}</button>
      </div>
      <div id="qr-reader-wrap">
        <div id="qr-reader"></div>
        <div class="scan-status" id="scan-status">Point your camera at a barcode or QR code.</div>
      </div>
    `);

    const html5QrCode = new Html5Qrcode("qr-reader");
    let stopped = false;

    html5QrCode.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 220, height: 140 } },
      (decodedText) => {
        if (stopped) return;
        const match = state.items.find((it) => (it.barcode || it.sku) === decodedText);
        document.getElementById("scan-status").textContent = match
          ? `Found: ${match.name}`
          : `No item matches "${decodedText}".`;
        stopped = true;
        html5QrCode.stop().then(() => {
          closeModal();
          if (match) {
            openQuickAdjustModal(match);
          } else if (confirm(`No item matches barcode "${decodedText}". Add it as a new item?`)) {
            openItemModal(null);
            setTimeout(() => {
              const barcodeInput = document.getElementById("f-barcode");
              if (barcodeInput) barcodeInput.value = decodedText;
            }, 0);
          }
        });
      },
      () => { /* ignore per-frame scan failures */ }
    ).catch(() => {
      document.getElementById("scan-status").textContent = "Couldn't access the camera. Check permissions and try again.";
    });

    const originalClose = document.getElementById("modal-close");
    originalClose.addEventListener("click", () => {
      if (!stopped) {
        stopped = true;
        html5QrCode.stop().catch(() => {});
      }
    });
  }

  function openItemModal(item) {
    const isNew = !item;
    const draft = item ? { ...item, customFields: item.customFields ? [...item.customFields] : [] } : {
      id: null, name: "", sku: "", barcode: "", folderId: state.folders[0] ? state.folders[0].id : null,
      qty: 0, min: 0, max: 100, unit: "units", customFields: [], photo: null,
    };

    if (!draft.folderId) {
      alert("Create a folder first, then add items to it.");
      return;
    }

    const folderOptions = state.folders.map((f) =>
      `<option value="${f.id}" ${f.id === draft.folderId ? "selected" : ""}>${escapeHtml(f.name)}</option>`
    ).join("");

    let workingFields = draft.customFields.map((f) => ({ ...f }));
    let workingPhoto = draft.photo || null;

    function renderCustomFieldsList() {
      const list = document.getElementById("custom-fields-list");
      if (!list) return;
      list.innerHTML = workingFields.map((f, i) => `
        <div class="custom-field-row">
          <input data-cf-key="${i}" placeholder="Field name" value="${escapeHtml(f.key)}" />
          <input data-cf-value="${i}" placeholder="Value" value="${escapeHtml(f.value)}" />
          <button type="button" class="custom-field-remove" data-cf-remove="${i}">${svg.x}</button>
        </div>
      `).join("");
      list.querySelectorAll("[data-cf-key]").forEach((el) => {
        el.addEventListener("input", (e) => { workingFields[Number(el.getAttribute("data-cf-key"))].key = e.target.value; });
      });
      list.querySelectorAll("[data-cf-value]").forEach((el) => {
        el.addEventListener("input", (e) => { workingFields[Number(el.getAttribute("data-cf-value"))].value = e.target.value; });
      });
      list.querySelectorAll("[data-cf-remove]").forEach((el) => {
        el.addEventListener("click", () => {
          workingFields.splice(Number(el.getAttribute("data-cf-remove")), 1);
          renderCustomFieldsList();
        });
      });
    }

    function renderPhotoField() {
      const box = document.getElementById("photo-upload-row");
      if (!box) return;
      box.innerHTML = `
        <div class="photo-preview-box">
          ${workingPhoto ? `<img src="${workingPhoto}" alt="">` : svg.box}
        </div>
        <div class="photo-upload-controls">
          <label for="f-photo-input">${workingPhoto ? "Change photo" : "Upload photo"}</label>
          <input type="file" id="f-photo-input" accept="image/*" style="display:none;" />
          ${workingPhoto ? `<span class="photo-remove-link" id="photo-remove-link">Remove photo</span>` : ""}
        </div>
      `;
      document.getElementById("f-photo-input").addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          workingPhoto = reader.result;
          renderPhotoField();
        };
        reader.readAsDataURL(file);
      });
      const removeLink = document.getElementById("photo-remove-link");
      if (removeLink) {
        removeLink.addEventListener("click", () => {
          workingPhoto = null;
          renderPhotoField();
        });
      }
    }

    showModal(`
      <div class="modal-header">
        <div class="modal-title">${isNew ? "Add Item" : "Edit Item"}</div>
        <button class="modal-close" id="modal-close">${svg.x}</button>
      </div>
      <div class="photo-upload-row" id="photo-upload-row"></div>
      <div class="field"><label>Item name</label><input id="f-name" value="${escapeHtml(draft.name)}" /></div>
      <div class="field"><label>SKU</label><input id="f-sku" value="${escapeHtml(draft.sku)}" /></div>
      <div class="field"><label>Barcode value (leave blank to use SKU)</label><input class="mono" id="f-barcode" value="${escapeHtml(draft.barcode || "")}" /></div>
      <div class="field"><label>Folder</label><select id="f-folder">${folderOptions}</select></div>
      <div class="field-row">
        <div class="field"><label>Qty on hand</label><input class="mono" type="number" id="f-qty" value="${draft.qty}" /></div>
        <div class="field"><label>Min threshold</label><input class="mono" type="number" id="f-min" value="${draft.min}" /></div>
        <div class="field"><label>Max capacity</label><input class="mono" type="number" id="f-max" value="${draft.max}" /></div>
      </div>
      <div class="field"><label>Unit</label><input id="f-unit" value="${escapeHtml(draft.unit)}" /></div>
      <div class="field">
        <label>Custom fields</label>
        <div class="custom-fields-list" id="custom-fields-list"></div>
        <div class="add-custom-field" id="add-custom-field">${svg.plus} Add custom field</div>
      </div>
      <button class="modal-save" id="modal-save">${isNew ? "Add to inventory" : "Save changes"}</button>
    `);

    renderPhotoField();
    renderCustomFieldsList();
    document.getElementById("add-custom-field").addEventListener("click", () => {
      workingFields.push({ key: "", value: "" });
      renderCustomFieldsList();
    });

    document.getElementById("modal-save").addEventListener("click", () => {
      const name = document.getElementById("f-name").value.trim();
      const sku = document.getElementById("f-sku").value.trim();
      if (!name || !sku) return;
      const cleanFields = workingFields.filter((f) => f.key.trim() !== "");
      const updated = {
        id: draft.id || uid("i"),
        name, sku,
        barcode: document.getElementById("f-barcode").value.trim() || sku,
        folderId: document.getElementById("f-folder").value,
        qty: Number(document.getElementById("f-qty").value) || 0,
        min: Number(document.getElementById("f-min").value) || 0,
        max: Number(document.getElementById("f-max").value) || 0,
        unit: document.getElementById("f-unit").value.trim() || "units",
        customFields: cleanFields,
        photo: workingPhoto,
      };
      if (isNew) {
        state.items.push(updated);
      } else {
        state.items = state.items.map((it) => (it.id === updated.id ? updated : it));
      }
      saveState();
      closeModal();
      render();
    });
  }

  function openFolderModal(folder) {
    const isNew = !folder;
    const draft = folder ? { ...folder } : { id: null, name: "" };

    showModal(`
      <div class="modal-header">
        <div class="modal-title">${isNew ? "New Folder" : "Edit Folder"}</div>
        <button class="modal-close" id="modal-close">${svg.x}</button>
      </div>
      <div class="field"><label>Folder name</label><input id="f-folder-name" value="${escapeHtml(draft.name)}" /></div>
      <button class="modal-save" id="modal-save-folder">${isNew ? "Create folder" : "Save changes"}</button>
      ${!isNew ? `<button class="modal-save danger-save" id="modal-delete-folder" style="margin-top:8px;">Delete folder</button>` : ""}
    `);

    document.getElementById("modal-save-folder").addEventListener("click", () => {
      const name = document.getElementById("f-folder-name").value.trim();
      if (!name) return;
      if (isNew) {
        state.folders.push({ id: uid("f"), name });
      } else {
        state.folders = state.folders.map((f) => (f.id === draft.id ? { ...f, name } : f));
      }
      saveState();
      closeModal();
      render();
    });

    const deleteBtn = document.getElementById("modal-delete-folder");
    if (deleteBtn) {
      deleteBtn.addEventListener("click", () => {
        const itemsInFolder = state.items.filter((it) => it.folderId === draft.id).length;
        if (itemsInFolder > 0 && !confirm(`This folder has ${itemsInFolder} item(s) in it. Delete the folder and its items?`)) {
          return;
        }
        state.folders = state.folders.filter((f) => f.id !== draft.id);
        state.items = state.items.filter((it) => it.folderId !== draft.id);
        if (state.selectedFolder === draft.id) state.selectedFolder = "all";
        saveState();
        closeModal();
        render();
      });
    }
  }

  function showModal(innerHtml) {
    const overlay = document.createElement("div");
    overlay.className = "modal-overlay";
    overlay.id = "modal-overlay";
    overlay.innerHTML = `<div class="modal">${innerHtml}</div>`;
    overlay.addEventListener("click", (e) => {
      if (e.target === overlay) closeModal();
    });
    document.body.appendChild(overlay);
    document.getElementById("modal-close").addEventListener("click", closeModal);
  }

  function closeModal() {
    const overlay = document.getElementById("modal-overlay");
    if (overlay) overlay.remove();
  }

  loadState();
  render();
  } // end startApp
})();
</script>
</body>
</html>
